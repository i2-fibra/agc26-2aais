<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>AGC 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',sans-serif;background:#000;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;line-height:1.5}
  h1{color:#F3C200;font-size:2.2rem;font-weight:800;margin-bottom:8px;letter-spacing:-.02em}
  .sub{color:#888;font-size:.95rem;margin-bottom:32px;text-align:center}
  .grid{display:flex;flex-direction:column;gap:16px;width:100%;max-width:420px}
  a.card{display:block;background:#0f0f0f;border:1px solid #1a1a1a;border-left:4px solid #0A9B84;padding:20px 22px;border-radius:10px;color:#fff;text-decoration:none;transition:all .15s}
  a.card:hover,a.card:active{border-color:#0A9B84;background:#141414;transform:translateY(-1px)}
  .day{color:#0A9B84;font-size:.78rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px}
  .title{font-size:1.15rem;font-weight:600}
  .date{color:#aaa;font-size:.85rem;margin-top:4px}
  footer{margin-top:40px;color:#444;font-size:.75rem}
</style>
</head>
<body>
  <h1>AGC 2026</h1>
  <p class="sub">Roteiros de campo</p>
  <div class="grid">
    <a class="card" href="ROTEIRO-DIA-6.html">
      <div class="day">Dia 1</div>
      <div class="title">Roteiro Dia 6</div>
      <div class="date">Quarta, 6 de maio</div>
    </a>
    <a class="card" href="ROTEIRO-DIA-7.html">
      <div class="day">Dia 2</div>
      <div class="title">Roteiro Dia 7</div>
      <div class="date">Quinta, 7 de maio</div>
    </a>
  </div>
  <footer>v1.0</footer>
</body>
</html>
